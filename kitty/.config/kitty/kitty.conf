# ==========================================
# Kitty — Win11 Fluent Dark Terminal
# ==========================================

# Font
font_family      Noto Sans Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Cursor
cursor_shape           beam
cursor_beam_thickness  1.5
cursor_blink_interval  0.5

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait    3.0
copy_on_select     no

# Window
window_padding_width    12
hide_window_decorations yes
remember_window_size    yes

# Background translucency (blur is handled by Hyprland)
background_opacity 0.90

# Win11 Dark color palette
foreground   #ffffff
background   #0c0c0c
selection_foreground #ffffff
selection_background #0067C0

# Black
color0   #0c0c0c
color8   #767676

# Red
color1   #c50f1f
color9   #e74856

# Green
color2   #13a10e
color10  #16c60c

# Yellow
color3   #c19c00
color11  #f9f1a5

# Blue
color4   #0037da
color12  #3b78ff

# Magenta
color5   #881798
color13  #b4009e

# Cyan
color6   #3a96dd
color14  #61d6d6

# White
color7   #cccccc
color15  #f2f2f2

# Tab bar
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #ffffff
active_tab_background   #0067C0
inactive_tab_foreground #cccccc
inactive_tab_background #1a1a1a

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# URLs
url_style curly
url_color #0067C0
open_url_with default
detect_urls yes
