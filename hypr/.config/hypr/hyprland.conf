##############################################
#  Hyprland — Windows 11 Fluent Design Rice  #
##############################################

################
### MONITORS ###
################
monitor=,preferred,auto,1

###################
### MY PROGRAMS ###
###################
$terminal    = kitty
$fileManager = dolphin
$menu        = rofi -show drun -theme ~/.config/rofi/win11.rasi
$browser     = xdg-open https://

#################
### AUTOSTART ###
#################
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = nm-applet --indicator
# NOTE: no `wl-clipboard` binary exists (package ships wl-copy/wl-paste).
# For clipboard history, install `cliphist` and use:
#   exec-once = wl-paste --watch cliphist store
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

#####################
### NVIDIA / ENV  ###
#####################
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XCURSOR_THEME,Fluent-dark-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Fluent-dark-cursors
env = HYPRCURSOR_SIZE,24

cursor {
    no_hardware_cursors = 0
}

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 4
    gaps_out = 8

    border_size = 1

    # Win11 accent blue (active) / subtle border (inactive)
    col.active_border   = rgba(0067C0ff) rgba(1976D2ff) 45deg
    col.inactive_border = rgba(3a3a3aaa)

    resize_on_border   = true
    allow_tearing      = false
    layout             = dwindle
}

decoration {
    rounding       = 10
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.97

    shadow {
        enabled       = true
        range         = 20
        render_power  = 3
        color         = rgba(00000066)
        color_inactive = rgba(00000033)
        offset        = 0, 4
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        noise             = 0.02
        contrast          = 1.0
        brightness        = 0.9
        vibrancy          = 0.15
        vibrancy_darkness = 0.0
        xray              = false
        special           = true
    }
}

animations {
    enabled = true

    # Win11-style: snappy, with a tiny overshoot
    bezier = win11,    0.05, 0.9, 0.1, 1.05
    bezier = winClose, 0.4,  0.0, 1.0, 1.0
    bezier = winFade,  0.0,  0.0, 0.2, 1.0

    animation = windows,     1, 4,  win11,    slide
    animation = windowsIn,   1, 4,  win11,    slide
    animation = windowsOut,  1, 3,  winClose, slide
    animation = border,      1, 10, default
    animation = borderangle, 1, 8,  default
    animation = fade,        1, 5,  winFade
    animation = workspaces,  1, 5,  win11,    slidevert
    animation = specialWorkspace, 1, 5, win11, slidevert
}

dwindle {
    pseudotile        = true
    preserve_split    = true
    smart_split       = false
    smart_resizing    = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper      = 0
    disable_hyprland_logo        = true
    disable_splash_rendering     = true
    mouse_move_enables_dpms      = true
    key_press_enables_dpms       = true
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
    enable_swallow               = true
    swallow_regex                = ^(kitty)$
}

#############
### INPUT ###
#############
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll   = true
        tap-to-click     = true
        drag_lock        = true
    }
}

gestures {
    workspace_swipe            = true
    workspace_swipe_fingers    = 3
    workspace_swipe_distance   = 300
    workspace_swipe_invert     = true
    workspace_swipe_min_speed_to_force = 30
}

####################
### WINDOW RULES ###
####################

# Float common dialogs / tools
windowrulev2 = float,         class:(pavucontrol)
windowrulev2 = float,         class:(nm-connection-editor)
windowrulev2 = float,         class:(org.kde.dolphin),title:(Copying|Moving|Progress)
windowrulev2 = float,         class:(xdg-desktop-portal-gtk)
windowrulev2 = center,        class:(pavucontrol)
windowrulev2 = center,        class:(nm-connection-editor)

# Blur for special windows
windowrulev2 = opacity 0.90 override, class:(kitty)
windowrulev2 = opacity 0.95 override, class:(dolphin)
windowrulev2 = opacity 0.95 override, class:(code-url-handler)

# No rounding for fullscreen
windowrulev2 = rounding 0, fullscreen:1

##########################
### WORKSPACES / RULES ###
##########################
workspace = 1, default:true
workspace = 2
workspace = 3
workspace = 4
workspace = 5

####################
### KEYBINDINGS  ###
####################
$mainMod = SUPER

# Apps
bind = $mainMod,       Return,    exec, $terminal
bind = $mainMod,       E,         exec, $fileManager
bind = $mainMod,       Space,     exec, $menu
bind = Alt,            F4,        killactive
bind = $mainMod SHIFT, Q,         killactive
bind = $mainMod SHIFT, M,         exit
bind = $mainMod,       V,         togglefloating
bind = $mainMod,       F,         fullscreen
bind = $mainMod,       P,         pseudo
bind = $mainMod,       J,         togglesplit

# Screenshot
bind = ,          Print,       exec, grim ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = SHIFT,     Print,       exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = $mainMod,  Print,       exec, grim -g "$(slurp)" - | wl-copy

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# Move windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, L,     movewindow, r
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, J,     movewindow, d

# Resize
binde = $mainMod CTRL, right, resizeactive,  30  0
binde = $mainMod CTRL, left,  resizeactive, -30  0
binde = $mainMod CTRL, up,    resizeactive,   0 -30
binde = $mainMod CTRL, down,  resizeactive,   0  30

# Workspaces — Win+1-5 like Win11 virtual desktops
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Scroll through workspaces on mouse over taskbar
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume & brightness (media keys)
bindel = , XF86AudioRaiseVolume,  exec, pamixer -i 5
bindel = , XF86AudioLowerVolume,  exec, pamixer -d 5
bindel = , XF86AudioMute,         exec, pamixer -t
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind   = , XF86AudioPlay,         exec, playerctl play-pause
bind   = , XF86AudioNext,         exec, playerctl next
bind   = , XF86AudioPrev,         exec, playerctl previous
